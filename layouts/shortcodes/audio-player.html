{{ $src := .Get "src" }}
{{ $title := .Get "title" | default "" }}
<div style="margin-bottom:12px;padding:8px 12px;background:var(--code-bg);border-radius:8px;">
  {{ if $title }}<p style="margin:0 0 4px;font-size:0.9em;font-weight:600;">🔊 {{ $title }}</p>{{ end }}
  <audio controls preload="none" style="width:100%;height:40px;">
    <source src="{{ $src }}" type="audio/mpeg">
    Trình duyệt không hỗ trợ audio.
  </audio>
</div>
